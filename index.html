<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente Financeiro Pessoal</title>
    <style>
        :root {
            --bg-principal: #f4f7f6;
            --bg-card: #ffffff;
            --texto-principal: #2c3e50;
            --texto-secundario: #7f8c8d;
            --cor-primaria: #3498db;
            --cor-sucesso: #2ecc71;
            --cor-perigo: #e74c3c;
            --cor-alerta: #f39c12;
            --cor-cartao: #9b59b6;
            --borda: #e2e8f0;
            --fonte: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--fonte);
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            color: var(--texto-principal);
            font-weight: 600;
        }

        /* Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--cor-primaria);
        }

        .card.saldo { border-left-color: var(--cor-primaria); }
        .card.entradas { border-left-color: var(--cor-sucesso); }
        .card.saidas { border-left-color: var(--cor-perigo); }

        .card h3 {
            font-size: 0.9rem;
            color: var(--texto-secundario);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .card .valor {
            font-size: 1.8rem;
            font-weight: bold;
        }

        /* Layout */
        .conteudo-principal {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 768px) {
            .conteudo-principal {
                grid-template-columns: 1.2fr 1.8fr;
            }
        }

        /* Blocos */
        .bloco {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .bloco h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: var(--texto-principal);
            border-bottom: 2px solid var(--bg-principal);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--borda);
            border-radius: 6px;
            font-size: 1rem;
            background-color: #fff;
            color: var(--texto-principal);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--cor-primaria);
        }

        .row-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background-color: var(--cor-primaria);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover { opacity: 0.9; }
        .btn-success { background-color: var(--cor-sucesso); }
        .btn-excel { background-color: #1f7246; }

        /* Área de Filtros Avançados */
        .grid-filtros {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        @media (min-width: 600px) {
            .grid-filtros {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .acoes-historico {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        /* Lista Histórico */
        .lista-transacoes {
            list-style: none;
            max-height: 500px;
            overflow-y: auto;
        }

        .transacao-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--borda);
            background: #fff;
            margin-bottom: 8px;
            border-radius: 6px;
            border-left: 4px solid var(--borda);
        }

        .transacao-item.entrada { border-left-color: var(--cor-sucesso); }
        .transacao-item.saida { border-left-color: var(--cor-perigo); }
        .transacao-item.cartao { border-left-color: var(--cor-cartao); background-color: #faf5ff;}

        .transacao-info .desc { font-weight: 600; font-size: 0.95rem; }
        .transacao-info .meta { font-size: 0.8rem; color: var(--texto-secundario); }
        .transacao-valores { text-align: right; display: flex; align-items: center; gap: 15px; }
        .transacao-valores .valor-t { font-weight: bold; }

        .entrada .valor-t { color: var(--cor-sucesso); }
        .saida .valor-t { color: var(--cor-perigo); }
        .cartao .valor-t { color: var(--cor-cartao); }

        .btn-deletar {
            background: none;
            border: none;
            color: var(--cor-perigo);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 5px;
        }

        .badge-cartao {
            background-color: var(--cor-cartao);
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Assistente Financeiro Pessoal</h1>
        </header>

        <section class="dashboard">
            <div class="card saldo">
                <h3>Saldo Real Otimizado</h3>
                <div class="valor" id="saldo-real">R$ 0,00</div>
            </div>
            <div class="card entradas">
                <h3>Entradas Filtradas</h3>
                <div class="valor" id="entradas-mes">R$ 0,00</div>
            </div>
            <div class="card saidas">
                <h3>Saídas Filtradas</h3>
                <div class="valor" id="saidas-mes">R$ 0,00</div>
            </div>
        </section>

        <div class="conteudo-principal">
            <section class="bloco">
                <h2>Novo Lançamento</h2>
                <form id="form-lancamento">
                    <div class="form-group">
                        <label for="descricao">Descrição detalhada</label>
                        <input type="text" id="descricao" class="form-control" required placeholder="Ex: Vinicius - Reembolso Software">
                    </div>

                    <div class="row-form">
                        <div class="form-group">
                            <label for="valor">Valor (R$)</label>
                            <input type="number" id="valor" step="0.01" class="form-control" required placeholder="0,00">
                        </div>
                        <div class="form-group">
                            <label for="tipo">Tipo</label>
                            <select id="tipo" class="form-control" required>
                                <option value="Saída">Saída</option>
                                <option value="Entrada">Entrada</option>
                            </select>
                        </div>
                    </div>

                    <div class="row-form">
                        <div class="form-group">
                            <label for="data">Data</label>
                            <input type="date" id="data" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="categoria">Categoria</label>
                            <input type="text" id="categoria" list="categorias-list" class="form-control" required placeholder="Selecione ou digite">
                            <datalist id="categorias-list">
                                <option value="Salário">
                                <option value="Contas Fixas">
                                <option value="Pagamento Fatura">
                                <option value="MEI Mensal">
                                <option value="ME Mensal">
                                <option value="Parcelamento MEI">
                                <option value="Desenquadramento">
                                <option value="Regularização">
                                <option value="IR">
                                <option value="Software">
                                <option value="Cursos">
                                <option value="Despesas">
                                <option value="Colaboradores">
                                <option value="Abertura de empresa">
                                <option value="Encerramento de empresa">
                                <option value="Gratificações">
                                <option value="Marketing">
                            </datalist>
                        </div>
                    </div>

                    <div class="row-form" style="border-top: 1px solid var(--borda); padding-top: 15px; margin-top: 15px;">
                        <div class="form-group">
                            <label for="parcela-atual">Parc. Atual</label>
                            <input type="number" id="parcela-atual" class="form-control" min="1" placeholder="1">
                        </div>
                        <div class="form-group">
                            <label for="parcela-total">Total Parc.</label>
                            <input type="number" id="parcela-total" class="form-control" min="1" placeholder="10">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success">Lançar Transação</button>
                </form>
            </section>

            <section class="bloco">
                <h2>Histórico de Transações</h2>
                
                <div class="grid-filtros">
                    <div>
                        <label style="font-size: 0.85rem; font-weight: bold;">Mês de Referência:</label>
                        <input type="month" id="filtro-mes" class="form-control">
                    </div>
                    <div>
                        <label style="font-size: 0.85rem; font-weight: bold;">Filtrar Categoria:</label>
                        <select id="filtro-categoria" class="form-control">
                            <option value="">Todas as Categorias</option>
                            <option value="Salário">Salário</option>
                            <option value="Contas Fixas">Contas Fixas</option>
                            <option value="Pagamento Fatura">Pagamento Fatura</option>
                            <option value="MEI Mensal">MEI Mensal</option>
                            <option value="ME Mensal">ME Mensal</option>
                            <option value="Parcelamento MEI">Parcelamento MEI</option>
                            <option value="Desenquadramento">Desenquadramento</option>
                            <option value="Regularização">Regularização</option>
                            <option value="IR">IR</option>
                            <option value="Software">Software</option>
                            <option value="Cursos">Cursos</option>
                            <option value="Despesas">Despesas</option>
                            <option value="Colaboradores">Colaboradores</option>
                            <option value="Abertura de empresa">Abertura de empresa</option>
                            <option value="Encerramento de empresa">Encerramento de empresa</option>
                            <option value="Gratificações">Gratificações</option>
                            <option value="Marketing">Marketing</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size: 0.85rem; font-weight: bold;">Buscar (Ex: Vinicius):</label>
                        <input type="text" id="filtro-busca" class="form-control" placeholder="Busque por nome/descrição...">
                    </div>
                </div>

                <div class="acoes-historico">
                    <button id="btn-exportar" class="btn btn-excel" style="width: auto;">Exportar Filtrados para Excel (CSV)</button>
                </div>

                <ul class="lista-transacoes" id="lista-transacoes">
                    </ul>
            </section>
        </div>
    </div>

    <script>
        let transacoes = JSON.parse(localStorage.getItem('transacoes')) || [];

        // Elementos
        const form = document.getElementById('form-lancamento');
        const filtroMes = document.getElementById('filtro-mes');
        const filtroCategoria = document.getElementById('filtro-categoria');
        const filtroBusca = document.getElementById('filtro-busca');
        const listaTransacoes = document.getElementById('lista-transacoes');
        const btnExportar = document.getElementById('btn-exportar');

        const txtSaldoReal = document.getElementById('saldo-real');
        const txtEntradasMes = document.getElementById('entradas-mes');
        const txtSaidasMes = document.getElementById('saidas-mes');

        // Inicialização de datas
        const hoje = new Date();
        const anoMesAtual = `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}`;
        filtroMes.value = anoMesAtual;
        document.getElementById('data').value = hoje.toISOString().split('T')[0];

        // Listeners para recálculo e filtragem em tempo real
        form.addEventListener('submit', salvarLancamento);
        filtroMes.addEventListener('change', atualizarInterface);
        filtroCategoria.addEventListener('change', atualizarInterface);
        filtroBusca.addEventListener('input', atualizarInterface);
        btnExportar.addEventListener('click', exportarCSV);

        const categoriasPadrao = [
            "Salário", "Contas Fixas", "Pagamento Fatura", "MEI Mensal", "ME Mensal", 
            "Parcelamento MEI", "Desenquadramento", "Regularização", "IR", "Software", 
            "Cursos", "Despesas", "Colaboradores", "Abertura de empresa", "Encerramento de empresa", 
            "Gratificações", "Marketing"
        ];

        atualizarInterface();

        function salvarLancamento(e) {
            e.preventDefault();
            const descricao = document.getElementById('descricao').value;
            const valor = parseFloat(document.getElementById('valor').value);
            const tipo = document.getElementById('tipo').value;
            const dataInput = document.getElementById('data').value;
            const categoria = document.getElementById('categoria').value;
            const pAtual = parseInt(document.getElementById('parcela-atual').value);
            const pTotal = parseInt(document.getElementById('parcela-total').value);
            const grupoId = 'g_' + Date.now();

            if (categoria === "Contas Fixas") {
                let dataBase = new Date(dataInput + 'T00:00:00');
                for (let i = 0; i < 12; i++) {
                    let novaData = new Date(dataBase);
                    novaData.setMonth(dataBase.getMonth() + i);
                    transacoes.push({
                        id: 't_' + Date.now() + '_' + i,
                        grupoId: grupoId,
                        descricao: `${descricao} (Fixo ${i+1}/12)`,
                        valor, tipo, categoria,
                        data: novaData.toISOString().split('T')[0]
                    });
                }
            } else if (!isNaN(pAtual) && !isNaN(pTotal) && pTotal >= pAtual) {
                let dataBase = new Date(dataInput + 'T00:00:00');
                let cont = 1;
                for (let i = pAtual; i <= pTotal; i++) {
                    let novaData = new Date(dataBase);
                    novaData.setMonth(dataBase.getMonth() + (cont - 1));
                    transacoes.push({
                        id: 't_' + Date.now() + '_' + i,
                        grupoId: grupoId,
                        descricao: `${descricao} (${i}/${pTotal})`,
                        valor, tipo, categoria,
                        data: novaData.toISOString().split('T')[0]
                    });
                    cont++;
                }
            } else {
                transacoes.push({
                    id: 't_' + Date.now(),
                    grupoId: null,
                    descricao, valor, tipo, categoria,
                    data: dataInput
                });
            }

            localStorage.setItem('transacoes', JSON.stringify(transacoes));
            form.reset();
            document.getElementById('data').value =
